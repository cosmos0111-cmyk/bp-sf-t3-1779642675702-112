<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="372" cy="541" r="25" fill="#0a1628" opacity="0.15"/>
    <circle cx="64" cy="599" r="54" fill="#0a1628" opacity="0.10"/>
    <circle cx="1117" cy="254" r="54" fill="#0a1628" opacity="0.14"/>
    <circle cx="866" cy="477" r="22" fill="#0a1628" opacity="0.16"/>
    <circle cx="892" cy="124" r="88" fill="#0a1628" opacity="0.11"/>
    <circle cx="1083" cy="257" r="67" fill="#0a1628" opacity="0.05"/>
    <rect x="194" y="52" width="83" height="65" rx="8" fill="#0d2137" opacity="0.12" transform="rotate(4, 902, 186)"/>
    <rect x="164" y="314" width="28" height="91" rx="8" fill="#0d2137" opacity="0.07" transform="rotate(1, 1266, 357)"/>
    <rect x="23" y="104" width="79" height="43" rx="8" fill="#0d2137" opacity="0.04" transform="rotate(12, 986, 671)"/>
    <rect x="682" y="117" width="71" height="85" rx="8" fill="#0d2137" opacity="0.07" transform="rotate(15, 450, 3)"/>
    <rect x="1084" y="178" width="35" height="77" rx="8" fill="#0d2137" opacity="0.06" transform="rotate(23, 609, 22)"/>
    <rect x="73" y="10" width="89" height="87" rx="8" fill="#0d2137" opacity="0.08" transform="rotate(25, 1284, 276)"/>
    <rect x="357" y="533" width="48" height="66" rx="8" fill="#0d2137" opacity="0.06" transform="rotate(38, 160, 307)"/>
    <rect x="1293" y="-54" width="47" height="54" rx="8" fill="#0d2137" opacity="0.03" transform="rotate(16, 1296, 564)"/>
    <polygon points="211,226 309,422 113,422" fill="#0a1628" opacity="0.08"/>
    <polygon points="504,171 571,305 437,305" fill="#0a1628" opacity="0.04"/>
    <polygon points="518,358 554,430 482,430" fill="#0a1628" opacity="0.09"/>
    <polygon points="358,452 403,542 313,542" fill="#0a1628" opacity="0.12"/>

  <!-- Wave at bottom -->
  <path d="M0,574 C360,602 840,546 1200,574 L1200,630 L0,630Z" fill="#0a1628" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    마포 셔츠룸
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 프록시 보안
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#00bcd4" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#00bcd4" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 마포 셔츠룸 — 프록시 보안
  </text>
</svg>